<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | DesignUI.site Console</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#faf8ff",
              "surface-container-low": "#f2f3ff",
              "surface-container": "#eaedff",
              "on-surface": "#131b2e",
              "tertiary": "#006242",
              "on-tertiary": "#ffffff",
              "inverse-primary": "#b4c5ff",
              "on-primary": "#ffffff",
              "on-surface-variant": "#434655",
              "on-error-container": "#93000a",
              "tertiary-container": "#007d55",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#005236",
              "on-secondary-fixed-variant": "#3f465c",
              "surface-tint": "#0053db",
              "primary": "#004ac6",
              "on-tertiary-fixed": "#002113",
              "on-primary-fixed-variant": "#003ea8",
              "on-primary-fixed": "#00174b",
              "surface-variant": "#dae2fd",
              "surface": "#faf8ff",
              "secondary-fixed-dim": "#bec6e0",
              "on-error": "#ffffff",
              "primary-container": "#2563eb",
              "primary-fixed": "#dbe1ff",
              "surface-dim": "#d2d9f4",
              "on-tertiary-container": "#bdffdb",
              "on-secondary-container": "#5c647a",
              "on-background": "#131b2e",
              "tertiary-fixed": "#6ffbbe",
              "surface-container-highest": "#dae2fd",
              "surface-container-high": "#e2e7ff",
              "secondary-fixed": "#dae2fd",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "surface-bright": "#faf8ff",
              "primary-fixed-dim": "#b4c5ff",
              "outline": "#737686",
              "secondary": "#565e74",
              "inverse-on-surface": "#eef0ff",
              "on-primary-container": "#eeefff",
              "inverse-surface": "#283044",
              "error": "#ba1a1a",
              "secondary-container": "#dae2fd",
              "on-secondary-fixed": "#131b2e",
              "tertiary-fixed-dim": "#4edea3",
              "outline-variant": "#c3c6d7"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .forge-gradient {
            background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-4">
<!-- Top Navigation (Shell Suppressed per Rule: Transactional Flow) -->
<!-- Brand Anchor Logo -->
<div class="mb-12">
<span class="text-2xl font-black tracking-tight text-on-surface">DesignUI.site <span class="font-light text-secondary">Console</span></span>
</div>
<!-- Main Signup Canvas -->
<main class="w-full max-w-[480px]">
<div class="surface-container-lowest glass-panel rounded-xl p-8 md:p-12 shadow-[0px_12px_32px_rgba(19,27,46,0.06)] border border-white/40">
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">Create Account</h1>
<p class="font-body text-secondary text-sm">Join the architectural atelier of digital design.</p>
</div>
<form class="space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="font-label text-xs font-medium uppercase tracking-wider text-on-surface-variant" for="name">Full Name</label>
<div class="relative group">
<input class="w-full h-12 px-4 bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 rounded focus:ring-2 focus:ring-surface-tint focus:outline-none transition-all duration-200 placeholder:text-outline-variant" id="name" placeholder="Alex Rivera" type="text"/>
</div>
</div>
<!-- Work Email Field -->
<div class="space-y-2">
<label class="font-label text-xs font-medium uppercase tracking-wider text-on-surface-variant" for="email">Work Email</label>
<div class="relative group">
<input class="w-full h-12 px-4 bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 rounded focus:ring-2 focus:ring-surface-tint focus:outline-none transition-all duration-200 placeholder:text-outline-variant" id="email" placeholder="alex@studio.design" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label text-xs font-medium uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 rounded focus:ring-2 focus:ring-surface-tint focus:outline-none transition-all duration-200 placeholder:text-outline-variant" id="password" placeholder="••••••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<p class="text-[10px] text-outline italic">Must be at least 12 characters with symbols.</p>
</div>
<!-- Terms Acceptance -->
<div class="flex items-start gap-3 py-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary-container bg-surface-container-lowest" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                        I acknowledge that I have read and agree to the <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="forge-gradient w-full h-12 rounded text-on-primary font-semibold text-sm tracking-wide shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all duration-150" type="submit">
                        Create Account
                    </button>
</div>
</form>
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-secondary">
                    Already have a console account?
                    <a class="text-primary font-bold hover:underline ml-1" href="sign_in.html">Sign in</a>
</p>
</div>
</div>
</main>
<!-- Visual Anchor / Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-surface-variant/20 overflow-hidden">
<div class="h-full w-1/3 forge-gradient"></div>
</div>
<!-- Footer (Using JSON Mapping Rules) -->
<footer class="mt-auto w-full flex flex-col md:flex-row justify-center items-center gap-6 py-12 px-8">
<span class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500">© 2024 DesignUI.site. All rights reserved.</span>
<div class="flex gap-6">
<a class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500 hover:underline opacity-80" href="#">Terms of Service</a>
<a class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500 hover:underline opacity-80" href="#">Privacy Policy</a>
<a class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500 hover:underline opacity-80" href="#">Security</a>
</div>
</footer>
<!-- Background Decoration: Subtle Abstract Shapes for "Atelier" Feel -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-1/2 -right-48 w-[600px] h-[600px] bg-surface-container-low/40 rounded-full blur-[120px] -z-10"></div>
</body></html>
