            background: rgba(248, 250, 252, 0.85);

<body class="bg-background font-body text-on-surface selection:bg-primary-fixed antialiased">
<!-- Subtle Architectural Background -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<img class="w-full h-full object-cover opacity-15 grayscale" data-alt="Interior of a modern architectural studio with high ceilings, large windows, and minimalist grey concrete textures in soft natural daylight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBNTinQo9npSVFMjiALbhMwoDAWyCTDSUNqRVa4DMhlCl7CSAtNU1Mo_iPW94S88G3id2AQn0Tudzg7brnnqJANsaVg75aVnmHK0ZI6HSo_xSeqdq8o5jVficijFAR02mpZZgunSv0KrksHO-AxptvpEwmLUgyj2CBayYAPTyGTaHHoqzRJ4P33gnTXd6iThYyNGHUEel8llBFjINrhuLebOL3fibXz_67i9K4c2Uksr3a1y009mKU-8j5QPqzPUf8IuI_sx3Qh2CYo"/>
<div class="absolute inset-0 bg-gradient-to-tr from-background via-transparent to-surface-container-low opacity-60"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[440px]">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-on-surface flex items-center justify-center rounded-lg mb-6 shadow-xl shadow-on-surface/10">
<span class="material-symbols-outlined text-surface text-3xl" data-icon="architecture">architecture</span>
</div>
<h2 class="font-headline font-extrabold text-2xl tracking-tight text-on-surface">DesignUI.site Console</h2>
<p class="font-label text-on-surface-variant text-sm mt-1 uppercase tracking-[0.15em] opacity-60">The Architectural Atelier</p>
</div>
<!-- Sign In Card -->
<div class="glass-panel rounded-xl shadow-[0px_12px_32px_rgba(19,27,46,0.06)] border border-surface-container-high p-10 overflow-hidden">
<div class="mb-8">
<h1 class="font-headline font-bold text-3xl text-on-surface tracking-tight">Sign In</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Continue to your workspace.</p>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label text-xs font-bold text-on-surface-variant tracking-wider uppercase" for="email">Email Address</label>
<div class="relative group">
<input class="w-full px-4 py-3.5 bg-surface-container-lowest border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:ring-offset-0 transition-all outline-none text-on-surface placeholder:text-on-surface-variant/40" id="email" placeholder="name@studio.com" type="email"/>
<div class="absolute inset-0 rounded-lg border border-outline-variant opacity-20 pointer-events-none group-focus-within:opacity-0"></div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block font-label text-xs font-bold text-on-surface-variant tracking-wider uppercase" for="password">Password</label>
<a class="text-[10px] font-bold text-primary hover:underline uppercase tracking-widest" href="forgot_password.html">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full px-4 py-3.5 bg-surface-container-lowest border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-0 rounded-lg border border-outline-variant opacity-20 pointer-events-none group-focus-within:opacity-0"></div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3">
<div class="relative flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary-container bg-surface-container-lowest transition-colors cursor-pointer" id="remember" type="checkbox"/>
</div>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Sign In Action -->
<div class="pt-2">
<button class="w-full forge-gradient text-on-primary font-bold py-4 px-6 rounded-lg shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all active:scale-[0.98] duration-150 flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-0.5 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Alternative Methods -->
<div class="mt-8 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant opacity-20"></div>
<span class="text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-[0.2em]">or</span>
<div class="h-[1px] flex-1 bg-outline-variant opacity-20"></div>
</div>
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low hover:bg-surface-container rounded-lg text-sm font-bold text-on-surface transition-colors duration-200">
<img alt="Google" class="w-4 h-4 grayscale opacity-70 group-hover:grayscale-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmqBVq7PnrElPllfWYf9G4yzfOs0xHnQec_5Pm6SYt3xU97VOFottoZQ1sKYNtqfNo_JK6_BZr0DV0Pc1_EGGKuMySfUyn33DqT9cKpnWKyjUaTolP17tbMm_IK4eHc1OR_Q_Y3Fph_0cuc-BLBhq3HJITrQr6Wx1uHY7LygBVEatf_Xdkh-QeD7wAIz97oA-hijd_cLxZPuktuE0Y1d8s87iTMZhCgq2TkiuK8Li_E8e3AEJDiQb5r_3c7UkG4r-ng-41gulYzBeE"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low hover:bg-surface-container rounded-lg text-sm font-bold text-on-surface transition-colors duration-200">
<span class="material-symbols-outlined text-lg opacity-70" data-icon="terminal">terminal</span>
                        SSO
                    </button>
</div>
</div>
<!-- Footer Sign Up Link -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant font-medium">
                    Don’t have an account?
                    <a class="text-primary font-bold hover:underline ml-1" href="sign_up.html">Sign up</a>
</p>
</div>
</div>
</main>
<!-- Footer Component (Shared) -->
<footer class="absolute bottom-0 w-full flex flex-col md:flex-row justify-center items-center gap-6 py-12 px-8 z-10 opacity-60">
<div class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500">
            © 2024 DesignUI.site. All rights reserved.
        </div>
<div class="flex gap-6">
<a class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500 hover:underline" href="#">Terms of Service</a>
<a class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500 hover:underline" href="#">Privacy Policy</a>
<a class="font-inter text-xs uppercase tracking-widest text-slate-500 dark:text-slate-500 hover:underline" href="#">Security</a>
</div>
</footer>
</body></html>
